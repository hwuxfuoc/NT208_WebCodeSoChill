name: CI/CD — Test & Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# ─────────────────────────────────────────────────────────────────
# JOB 1: BACKEND TESTS (Jest + Supertest + mongodb-memory-server)
# ─────────────────────────────────────────────────────────────────
jobs:
  test-backend:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      # Cache mongodb-memory-server binary để tránh download mỗi lần (~80MB)
      - name: Cache mongodb-memory-server binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-binaries-${{ runner.os }}

      - name: Run backend tests
        working-directory: backend
        run: npm test
        env:
          # 🔑 JWT_SECRET: Điền vào GitHub Secrets
          # Đây là key dùng cho test — không cần trùng production
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NODE_ENV: test
          # Không cần MONGOOSE_DB_URL thật — dùng mongodb-memory-server

  # ─────────────────────────────────────────────────────────────────
  # JOB 2: AI SERVICE TESTS (pytest + FastAPI TestClient)
  # ─────────────────────────────────────────────────────────────────
  test-ai-service:
    name: 🤖 AI Service Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ai-service/requirements.txt

      - name: Install AI service dependencies
        working-directory: ai-service
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run AI service tests
        working-directory: ai-service
        run: pytest
        env:
          # Ollama không cần chạy thật — tất cả đều được mock trong test
          OLLAMA_URL: http://localhost:11434/api/generate
          OLLAMA_MODEL: qwen2.5-coder:7b

  # ─────────────────────────────────────────────────────────────────
  # JOB 3: FRONTEND TESTS (Vitest + jsdom)
  # ─────────────────────────────────────────────────────────────────
  test-frontend:
    name: ⚛️ Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      # Build check: đảm bảo TypeScript không có lỗi compile
      - name: Build frontend (type check + bundle)
        working-directory: frontend
        run: npm run build
        env:
          # 🔑 VITE_API_URL: URL backend đã deploy trên Render
          # VD: https://codesochill-backend.onrender.com
          # Điền vào GitHub Secrets hoặc để trống nếu chưa có
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

  # ─────────────────────────────────────────────────────────────────
  # JOB 4: DEPLOY (chỉ chạy khi CẢ 3 job test đều pass)
  # Chỉ deploy khi push vào main, KHÔNG deploy khi chỉ là PR
  # ─────────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy All Services
    runs-on: ubuntu-latest
    needs: [test-backend, test-ai-service, test-frontend]
    # Chỉ deploy khi push vào main (không deploy khi PR)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── DEPLOY BACKEND → RENDER ──────────────────────────────────
      - name: 🟢 Trigger Render Backend Deploy
        run: |
          echo "Triggering Backend deploy on Render..."
          # 🔑 RENDER_BACKEND_HOOK: Điền vào GitHub Secrets
          # Lấy tại: Render Dashboard → Backend Service → Settings → Deploy Hook
          curl --silent --fail \
            --request POST \
            "${{ secrets.RENDER_BACKEND_HOOK }}"
          echo "✅ Backend deploy triggered!"

      # ── DEPLOY AI SERVICE → RENDER ───────────────────────────────
      - name: 🤖 Trigger Render AI Service Deploy
        run: |
          echo "Triggering AI Service deploy on Render..."
          # 🔑 RENDER_AI_HOOK: Điền vào GitHub Secrets
          # Lấy tại: Render Dashboard → AI Service → Settings → Deploy Hook
          curl --silent --fail \
            --request POST \
            "${{ secrets.RENDER_AI_HOOK }}"
          echo "✅ AI Service deploy triggered!"

      # ── DEPLOY FRONTEND → VERCEL ─────────────────────────────────
      - name: Setup Node.js (for Vercel CLI)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: ⚡ Deploy Frontend to Vercel (Production)
        working-directory: frontend
        run: |
          echo "Deploying Frontend to Vercel..."
          vercel pull --yes \
            --environment=production \
            --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod \
            --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod \
            --token=${{ secrets.VERCEL_TOKEN }}
          echo "✅ Frontend deployed to Vercel!"
        env:
          # 🔑 VERCEL_TOKEN: Điền vào GitHub Secrets
          # Lấy tại: https://vercel.com/account/tokens → Create
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          # 🔑 VERCEL_ORG_ID: Điền vào GitHub Secrets
          # Chạy `vercel link` trong thư mục frontend/
          # rồi mở file frontend/.vercel/project.json → lấy field "orgId"
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          # 🔑 VERCEL_PROJECT_ID: Điền vào GitHub Secrets
          # Cùng file frontend/.vercel/project.json → lấy field "projectId"
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: 🎉 Deploy Summary
        run: |
          echo "=========================================="
          echo "  ✅ All services deployed successfully!"
          echo "  🟢 Backend  → Render (triggered)"
          echo "  🤖 AI Svc   → Render (triggered)"
          echo "  ⚡ Frontend  → Vercel  (production)"
          echo "=========================================="
